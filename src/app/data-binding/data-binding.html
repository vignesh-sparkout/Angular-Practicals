<h2>Data-Binding</h2>
<p>{{name}}</p>
<br>
<hr>
<div>
  <h3>Property-Binding</h3>
  <button class="btn btn-success" [disabled]="btnToggle">Available</button>

  <hr>

<div class="two-way">
  <input type="text" [(ngModel)]="userName" placeholder="Enter Your Name">
  <p>Your name : {{userName}}</p>
</div>
