
<h2 class="title">Data Binding</h2>

<!-- Interpolation -->
<p class="text">{{ title }}</p>

<hr>

<!-- Property Binding -->
<div class="container">
  <h3>Property Binding</h3>
  <button [disabled]="btnToggle">
    {{ btnToggle ? 'Loading...' : 'Available' }}
  </button>
</div>

<hr>

<!-- Event Binding -->
<div class="container">
  <h3>Event Binding</h3>
  <button (click)="onChangeTitle()">Click Here</button>
</div>

<hr>

<!-- Two Way Binding -->
<div class="container two-way">
  <h3>Two Way Binding</h3>
  <input type="text" [(ngModel)]="userName" placeholder="Enter Your Name">
  <p>Your name: {{ userName }}</p>
</div>
