
<div class="form-page">
  <div class="card">
    <p class="template">Template-driven</p>
    <form #userForm="ngForm" (ngSubmit)="onSubmit(userForm)" novalidate>
      <div class="field">
        <label for="name">Full name</label>
        <input
          id="name"
          type="text"
          name="name"
          [(ngModel)]="user.name"
          required
          #name="ngModel"
          placeholder="Enter your Full Name" >
        <small class="error" *ngIf="name.invalid && name.touched">Name is required.</small>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          name="email"
          [(ngModel)]="user.email"
          required
          email
          #email="ngModel"
          placeholder="you@example.com" />
        <small class="error" *ngIf="email.invalid && email.touched">
          Enter a valid email address.
        </small>
      </div>

      <div class="actions">
        <button type="submit" [disabled]="userForm.invalid">Send</button>
      </div>
    </form>
  </div>
</div>
